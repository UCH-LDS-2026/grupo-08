<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HistoryCar</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #b9ff4b;
    --verde-dim: #8bc934;
    --negro: #0a0a0a;
    --gris-oscuro: #111111;
    --gris-panel: #1a1a1a;
    --gris-borde: #2a2a2a;
    --gris-texto: #888;
    --blanco: #f0f0f0;
    --rojo: #ff4b4b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--negro);
    color: var(--blanco);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* SCANLINE EFFECT */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 2rem;
    border-bottom: 1px solid var(--gris-borde);
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(10px);
    z-index: 100;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--verde);
    letter-spacing: -1px;
  }

  .logo span { color: var(--blanco); }

  .user-badge {
    display: none;
    align-items: center;
    gap: 0.6rem;
    background: var(--gris-panel);
    border: 1px solid var(--gris-borde);
    padding: 0.4rem 1rem;
    border-radius: 999px;
    font-size: 0.8rem;
    font-family: 'Space Mono', monospace;
  }

  .user-badge.visible { display: flex; }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--verde);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .btn-logout {
    background: none;
    border: 1px solid var(--gris-borde);
    color: var(--gris-texto);
    padding: 0.3rem 0.7rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.75rem;
    font-family: 'Space Mono', monospace;
    transition: all 0.2s;
  }

  .btn-logout:hover { border-color: var(--rojo); color: var(--rojo); }

  /* MAIN */
  main { padding: 2rem; max-width: 1000px; margin: 0 auto; }

  /* SECCIONES */
  .seccion {
    display: none;
    animation: fadeIn 0.3s ease;
  }

  .seccion.activa { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* LOGIN / REGISTRO */
  .auth-container {
    max-width: 420px;
    margin: 3rem auto;
  }

  .auth-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 2rem;
    border: 1px solid var(--gris-borde);
    border-radius: 10px;
    overflow: hidden;
  }

  .auth-tab {
    flex: 1;
    padding: 0.7rem;
    background: none;
    border: none;
    color: var(--gris-texto);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .auth-tab.activo {
    background: var(--verde);
    color: var(--negro);
    font-weight: 700;
  }

  .card {
    background: var(--gris-panel);
    border: 1px solid var(--gris-borde);
    border-radius: 14px;
    padding: 2rem;
  }

  .card-title {
    font-size: 1.4rem;
    font-weight: 800;
    margin-bottom: 0.3rem;
  }

  .card-sub {
    color: var(--gris-texto);
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
    font-family: 'Space Mono', monospace;
  }

  .campo {
    margin-bottom: 1rem;
  }

  label {
    display: block;
    font-size: 0.75rem;
    color: var(--gris-texto);
    margin-bottom: 0.4rem;
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  input, select {
    width: 100%;
    background: var(--negro);
    border: 1px solid var(--gris-borde);
    color: var(--blanco);
    padding: 0.7rem 1rem;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    transition: border-color 0.2s;
    outline: none;
  }

  input:focus, select:focus { border-color: var(--verde); }

  select option { background: var(--gris-panel); }

  .btn {
    width: 100%;
    padding: 0.85rem;
    background: var(--verde);
    color: var(--negro);
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.5rem;
  }

  .btn:hover { background: var(--verde-dim); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .btn-secondary {
    background: var(--gris-panel);
    color: var(--blanco);
    border: 1px solid var(--gris-borde);
  }

  .btn-secondary:hover { background: var(--gris-borde); border-color: var(--verde); }

  .mensaje {
    padding: 0.7rem 1rem;
    border-radius: 8px;
    font-size: 0.85rem;
    font-family: 'Space Mono', monospace;
    margin-top: 1rem;
    display: none;
  }

  .mensaje.ok { background: rgba(185,255,75,0.1); border: 1px solid var(--verde); color: var(--verde); display: block; }
  .mensaje.error { background: rgba(255,75,75,0.1); border: 1px solid var(--rojo); color: var(--rojo); display: block; }

  /* DASHBOARD */
  .dash-header {
    margin-bottom: 2rem;
  }

  .dash-title {
    font-size: 2rem;
    font-weight: 800;
    line-height: 1.1;
  }

  .dash-title span { color: var(--verde); }

  .dash-sub {
    color: var(--gris-texto);
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    margin-top: 0.4rem;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }

  @media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } }

  .panel-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--verde);
    font-family: 'Space Mono', monospace;
    margin-bottom: 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--gris-borde);
  }

  /* LISTA VEHICULOS */
  .vehiculo-item {
    background: var(--negro);
    border: 1px solid var(--gris-borde);
    border-radius: 10px;
    padding: 1rem;
    margin-bottom: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .vehiculo-item:hover { border-color: var(--verde); background: rgba(185,255,75,0.03); }

  .vehiculo-info { flex: 1; }

  .vehiculo-patente {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    font-weight: 700;
    color: var(--verde);
    letter-spacing: 2px;
  }

  .vehiculo-detalle {
    font-size: 0.8rem;
    color: var(--gris-texto);
    margin-top: 0.2rem;
  }

  .vehiculo-km {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--gris-texto);
    text-align: right;
  }

  .empty-state {
    text-align: center;
    padding: 2rem;
    color: var(--gris-texto);
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    border: 1px dashed var(--gris-borde);
    border-radius: 10px;
  }

  /* HISTORIAL */
  .historial-item {
    background: var(--negro);
    border: 1px solid var(--gris-borde);
    border-radius: 10px;
    padding: 1rem;
    margin-bottom: 0.8rem;
    display: flex;
    gap: 1rem;
    align-items: flex-start;
  }

  .hist-fecha {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--verde);
    white-space: nowrap;
    padding-top: 0.1rem;
  }

  .hist-tipo {
    font-weight: 700;
    font-size: 0.9rem;
    margin-bottom: 0.2rem;
  }

  .hist-desc {
    font-size: 0.8rem;
    color: var(--gris-texto);
    font-family: 'Space Mono', monospace;
  }

  .hist-taller {
    font-size: 0.75rem;
    color: var(--verde-dim);
    margin-top: 0.3rem;
  }

  .hist-km {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--gris-texto);
    margin-left: auto;
    white-space: nowrap;
  }

  /* NAV TABS */
  .nav-tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
    border-bottom: 1px solid var(--gris-borde);
    padding-bottom: 0;
  }

  .nav-tab {
    padding: 0.6rem 1.2rem;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--gris-texto);
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: -1px;
  }

  .nav-tab.activo { color: var(--verde); border-bottom-color: var(--verde); }
  .nav-tab:hover { color: var(--blanco); }

  /* LOADING */
  .loading {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--gris-borde);
    border-top-color: var(--verde);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .badge {
    display: inline-block;
    background: rgba(185,255,75,0.15);
    color: var(--verde);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    padding: 0.2rem 0.6rem;
    border-radius: 999px;
    border: 1px solid rgba(185,255,75,0.3);
  }

  /* BUSCAR PATENTE */
  .buscar-row {
    display: flex;
    gap: 0.8rem;
    margin-bottom: 1.5rem;
  }

  .buscar-row input { flex: 1; }
  .buscar-row .btn { width: auto; padding: 0.7rem 1.5rem; margin-top: 0; }

  .resultado-busqueda {
    background: var(--gris-panel);
    border: 1px solid var(--gris-borde);
    border-radius: 10px;
    padding: 1.2rem;
    display: none;
  }

  .resultado-busqueda.visible { display: block; }

  .res-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .res-campo label {
    color: var(--gris-texto);
    font-size: 0.7rem;
    margin-bottom: 0.2rem;
  }

  .res-campo .valor {
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    color: var(--blanco);
  }
</style>
</head>
<body>

<header>
  <div class="logo">History<span>Car</span></div>
  <div class="user-badge" id="userBadge">
    <div class="dot"></div>
    <span id="userNombre"></span>
    <span class="badge" id="userRol"></span>
    <button class="btn-logout" onclick="logout()">salir</button>
  </div>
</header>

<main>

  <!-- ===== LOGIN / REGISTRO ===== -->
  <div class="seccion activa" id="secAuth">
    <div class="auth-container">
      <div class="auth-tabs">
        <button class="auth-tab activo" onclick="switchTab('login')">Iniciar sesión</button>
        <button class="auth-tab" onclick="switchTab('registro')">Registrarse</button>
      </div>

      <!-- LOGIN -->
      <div id="formLogin">
        <div class="card">
          <div class="card-title">Bienvenido</div>
          <div class="card-sub">// ingresá tus credenciales</div>
          <div class="campo">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="juan@gmail.com">
          </div>
          <div class="campo">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••">
          </div>
          <button class="btn" onclick="login()">Entrar</button>
          <div class="mensaje" id="loginMsg"></div>
        </div>
      </div>

      <!-- REGISTRO -->
      <div id="formRegistro" style="display:none">
        <div class="card">
          <div class="card-title">Crear cuenta</div>
          <div class="card-sub">// nuevo usuario</div>
          <div class="campo">
            <label>Nombre</label>
            <input type="text" id="regNombre" placeholder="Tu nombre o taller">
          </div>
          <div class="campo">
            <label>Email</label>
            <input type="email" id="regEmail" placeholder="email@ejemplo.com">
          </div>
          <div class="campo">
            <label>Password</label>
            <input type="password" id="regPassword" placeholder="••••••">
          </div>
          <div class="campo">
            <label>Rol</label>
            <select id="regRol">
              <option value="dueno">Dueño de vehículo</option>
              <option value="taller">Taller / Mecánico</option>
            </select>
          </div>
          <button class="btn" onclick="registro()">Registrarse</button>
          <div class="mensaje" id="regMsg"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== DASHBOARD ===== -->
  <div class="seccion" id="secDash">
    <div class="dash-header">
      <div class="dash-title">Panel <span>principal</span></div>
      <div class="dash-sub">// historycar — grupo 08</div>
    </div>

    <div class="nav-tabs">
      <button class="nav-tab activo" onclick="switchNav('misVehiculos')">Mis vehículos</button>
      <button class="nav-tab" onclick="switchNav('agregarVehiculo')">+ Vehículo</button>
      <button class="nav-tab" onclick="switchNav('agregarServicio')">+ Servicio</button>
      <button class="nav-tab" onclick="switchNav('buscarPatente')">Buscar patente</button>
    </div>

    <!-- MIS VEHICULOS -->
    <div id="navMisVehiculos">
      <div class="panel-title">vehículos registrados</div>
      <div id="listaVehiculos"><div class="empty-state">Cargando...</div></div>
    </div>

    <!-- AGREGAR VEHICULO -->
    <div id="navAgregarVehiculo" style="display:none">
      <div class="panel-title">registrar vehículo</div>
      <div class="card" style="max-width:500px">
        <div class="grid-2">
          <div class="campo">
            <label>Patente</label>
            <input type="text" id="vPatente" placeholder="ABC123">
          </div>
          <div class="campo">
            <label>VIN</label>
            <input type="text" id="vVin" placeholder="Opcional">
          </div>
          <div class="campo">
            <label>Marca</label>
            <input type="text" id="vMarca" placeholder="Ford">
          </div>
          <div class="campo">
            <label>Modelo</label>
            <input type="text" id="vModelo" placeholder="Focus">
          </div>
          <div class="campo">
            <label>Año</label>
            <input type="number" id="vAnio" placeholder="2020">
          </div>
          <div class="campo">
            <label>Kilometraje</label>
            <input type="number" id="vKm" placeholder="50000">
          </div>
        </div>
        <button class="btn" onclick="agregarVehiculo()">Registrar vehículo</button>
        <div class="mensaje" id="vMsg"></div>
      </div>
    </div>

    <!-- AGREGAR SERVICIO -->
    <div id="navAgregarServicio" style="display:none">
      <div class="panel-title">cargar servicio al historial</div>
      <div class="card" style="max-width:500px">
        <div class="campo">
          <label>ID del vehículo</label>
          <input type="number" id="sVehiculo" placeholder="1">
        </div>
        <div class="campo">
          <label>Tipo de servicio</label>
          <select id="sTipo">
            <option>Cambio de aceite</option>
            <option>Cambio de frenos</option>
            <option>Cambio de correa</option>
            <option>Cambio de filtros</option>
            <option>Diagnóstico eléctrico</option>
            <option>Revisión general</option>
            <option>Otro</option>
          </select>
        </div>
        <div class="campo">
          <label>Descripción</label>
          <input type="text" id="sDesc" placeholder="Detalle del servicio">
        </div>
        <div class="grid-2">
          <div class="campo">
            <label>Kilometraje</label>
            <input type="number" id="sKm" placeholder="50000">
          </div>
          <div class="campo">
            <label>Fecha</label>
            <input type="date" id="sFecha">
          </div>
        </div>
        <button class="btn" onclick="agregarServicio()">Cargar servicio</button>
        <div class="mensaje" id="sMsg"></div>
      </div>
    </div>

    <!-- BUSCAR PATENTE -->
    <div id="navBuscarPatente" style="display:none">
      <div class="panel-title">buscar vehículo por patente</div>
      <div class="buscar-row">
        <input type="text" id="buscarInput" placeholder="ABC123" style="text-transform:uppercase">
        <button class="btn" onclick="buscarPatente()">Buscar</button>
      </div>
      <div class="resultado-busqueda" id="resultadoBusqueda"></div>
    </div>

  </div>

</main>

<script>
const API = 'http://localhost:3000/api';
let token = localStorage.getItem('hc_token');
let usuario = JSON.parse(localStorage.getItem('hc_usuario') || 'null');

// Al cargar: si hay token, ir al dash
window.onload = () => {
  if (token && usuario) mostrarDash();
  // Poner fecha de hoy en el campo fecha
  const hoy = new Date().toISOString().split('T')[0];
  document.getElementById('sFecha').value = hoy;
};

function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => {
    t.classList.toggle('activo', (tab==='login' && i===0) || (tab==='registro' && i===1));
  });
  document.getElementById('formLogin').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('formRegistro').style.display = tab === 'registro' ? 'block' : 'none';
}

function switchNav(nav) {
  ['misVehiculos','agregarVehiculo','agregarServicio','buscarPatente'].forEach(n => {
    document.getElementById('nav' + n.charAt(0).toUpperCase() + n.slice(1)).style.display = n === nav ? 'block' : 'none';
  });
  document.querySelectorAll('.nav-tab').forEach((t,i) => {
    const navs = ['misVehiculos','agregarVehiculo','agregarServicio','buscarPatente'];
    t.classList.toggle('activo', navs[i] === nav);
  });
  if (nav === 'misVehiculos') cargarVehiculos();
}

function mostrarMsg(id, texto, tipo) {
  const el = document.getElementById(id);
  el.textContent = texto;
  el.className = 'mensaje ' + tipo;
  setTimeout(() => { el.className = 'mensaje'; }, 4000);
}

async function login() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) return mostrarMsg('loginMsg', 'Completá todos los campos', 'error');
  try {
    const r = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await r.json();
    if (!r.ok) return mostrarMsg('loginMsg', data.error, 'error');
    token = data.token;
    usuario = data.usuario;
    localStorage.setItem('hc_token', token);
    localStorage.setItem('hc_usuario', JSON.stringify(usuario));
    mostrarDash();
  } catch(e) {
    mostrarMsg('loginMsg', 'No se pudo conectar al servidor', 'error');
  }
}

async function registro() {
  const nombre = document.getElementById('regNombre').value;
  const email = document.getElementById('regEmail').value;
  const password = document.getElementById('regPassword').value;
  const rol = document.getElementById('regRol').value;
  if (!nombre || !email || !password) return mostrarMsg('regMsg', 'Completá todos los campos', 'error');
  try {
    const r = await fetch(API + '/auth/registro', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({nombre, email, password, rol})
    });
    const data = await r.json();
    if (!r.ok) return mostrarMsg('regMsg', data.error, 'error');
    mostrarMsg('regMsg', 'Usuario creado. Ahora iniciá sesión.', 'ok');
    setTimeout(() => switchTab('login'), 1500);
  } catch(e) {
    mostrarMsg('regMsg', 'No se pudo conectar al servidor', 'error');
  }
}

function mostrarDash() {
  document.getElementById('secAuth').classList.remove('activa');
  document.getElementById('secDash').classList.add('activa');
  document.getElementById('userNombre').textContent = usuario.nombre;
  document.getElementById('userRol').textContent = usuario.rol;
  document.getElementById('userBadge').classList.add('visible');
  cargarVehiculos();
}

function logout() {
  token = null; usuario = null;
  localStorage.removeItem('hc_token');
  localStorage.removeItem('hc_usuario');
  document.getElementById('secDash').classList.remove('activa');
  document.getElementById('secAuth').classList.add('activa');
  document.getElementById('userBadge').classList.remove('visible');
}

async function cargarVehiculos() {
  const lista = document.getElementById('listaVehiculos');
  lista.innerHTML = '<div class="empty-state"><span class="loading"></span> Cargando...</div>';
  try {
    const r = await fetch(API + '/vehiculos/mis-vehiculos', {
      headers: {'Authorization': 'Bearer ' + token}
    });
    const data = await r.json();
    if (!data.vehiculos || data.vehiculos.length === 0) {
      lista.innerHTML = '<div class="empty-state">No tenés vehículos registrados.<br>Usá la pestaña "+ Vehículo" para agregar uno.</div>';
      return;
    }
    lista.innerHTML = data.vehiculos.map(v => `
      <div class="vehiculo-item" onclick="verHistorial(${v.id}, '${v.patente}')">
        <div class="vehiculo-info">
          <div class="vehiculo-patente">${v.patente}</div>
          <div class="vehiculo-detalle">${v.marca} ${v.modelo} · ${v.anio}</div>
        </div>
        <div class="vehiculo-km">${v.kilometraje.toLocaleString()} km<br><span style="color:#444;font-size:0.7rem">ver historial →</span></div>
      </div>
    `).join('');
  } catch(e) {
    lista.innerHTML = '<div class="empty-state">Error al cargar vehículos</div>';
  }
}

async function verHistorial(id, patente) {
  switchNav('buscarPatente');
  document.getElementById('buscarInput').value = patente;
  await buscarPatente();
}

async function agregarVehiculo() {
  const patente = document.getElementById('vPatente').value.toUpperCase();
  const vin = document.getElementById('vVin').value;
  const marca = document.getElementById('vMarca').value;
  const modelo = document.getElementById('vModelo').value;
  const anio = parseInt(document.getElementById('vAnio').value);
  const kilometraje = parseInt(document.getElementById('vKm').value) || 0;
  if (!patente || !marca || !modelo || !anio) return mostrarMsg('vMsg', 'Completá los campos obligatorios', 'error');
  try {
    const r = await fetch(API + '/vehiculos', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify({patente, vin, marca, modelo, anio, kilometraje})
    });
    const data = await r.json();
    if (!r.ok) return mostrarMsg('vMsg', data.error, 'error');
    mostrarMsg('vMsg', 'Vehículo registrado exitosamente ✓', 'ok');
    document.getElementById('vPatente').value='';
    document.getElementById('vMarca').value='';
    document.getElementById('vModelo').value='';
    document.getElementById('vAnio').value='';
    document.getElementById('vKm').value='';
  } catch(e) {
    mostrarMsg('vMsg', 'Error de conexión', 'error');
  }
}

async function agregarServicio() {
  const vehiculo_id = parseInt(document.getElementById('sVehiculo').value);
  const tipo_servicio = document.getElementById('sTipo').value;
  const descripcion = document.getElementById('sDesc').value;
  const kilometraje_servicio = parseInt(document.getElementById('sKm').value);
  const fecha_servicio = document.getElementById('sFecha').value;
  if (!vehiculo_id || !kilometraje_servicio || !fecha_servicio) return mostrarMsg('sMsg', 'Completá todos los campos', 'error');
  try {
    const r = await fetch(API + '/historial', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify({vehiculo_id, tipo_servicio, descripcion, kilometraje_servicio, fecha_servicio})
    });
    const data = await r.json();
    if (!r.ok) return mostrarMsg('sMsg', data.error, 'error');
    mostrarMsg('sMsg', 'Servicio registrado exitosamente ✓', 'ok');
  } catch(e) {
    mostrarMsg('sMsg', 'Error de conexión', 'error');
  }
}

async function buscarPatente() {
  const patente = document.getElementById('buscarInput').value.toUpperCase().trim();
  if (!patente) return;
  const res = document.getElementById('resultadoBusqueda');
  res.innerHTML = '<span class="loading"></span> Buscando...';
  res.classList.add('visible');
  try {
    const rv = await fetch(API + '/vehiculos/patente/' + patente);
    if (!rv.ok) {
      res.innerHTML = '<div style="color:var(--rojo);font-family:monospace;font-size:0.85rem">Vehículo no encontrado</div>';
      return;
    }
    const {vehiculo} = await rv.json();
    const rh = await fetch(API + '/historial/vehiculo/' + vehiculo.id);
    const {historial} = await rh.json();
    res.innerHTML = `
      <div class="res-grid">
        <div class="res-campo"><label>Patente</label><div class="valor" style="color:var(--verde)">${vehiculo.patente}</div></div>
        <div class="res-campo"><label>Vehículo</label><div class="valor">${vehiculo.marca} ${vehiculo.modelo}</div></div>
        <div class="res-campo"><label>Año · KM</label><div class="valor">${vehiculo.anio} · ${vehiculo.kilometraje.toLocaleString()} km</div></div>
      </div>
      <div class="panel-title" style="margin-top:0.5rem">historial de servicios</div>
      ${historial.length === 0
        ? '<div class="empty-state">Sin servicios registrados</div>'
        : historial.map(h => `
          <div class="historial-item">
            <div class="hist-fecha">${h.fecha_servicio}</div>
            <div style="flex:1">
              <div class="hist-tipo">${h.tipo_servicio}</div>
              <div class="hist-desc">${h.descripcion || '—'}</div>
              <div class="hist-taller">↳ ${h.nombre_taller || 'Taller registrado'}</div>
            </div>
            <div class="hist-km">${h.kilometraje_servicio?.toLocaleString()} km</div>
          </div>
        `).join('')
      }
    `;
  } catch(e) {
    res.innerHTML = '<div style="color:var(--rojo);font-family:monospace;font-size:0.85rem">Error de conexión</div>';
  }
}
</script>
